name: Build Flutter iOS (Unsigned IPA)

on:
  push:
    branches: [ "main", "master" ] 
  workflow_dispatch: # 手动触发按钮

jobs:
  build:
    runs-on: macos-latest # 必须使用 macOS 服务器才能编译 iOS

    steps:
    - name: 📥 拉取代码
      uses: actions/checkout@v4

    - name: 🐦 配置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: 📦 获取依赖
      run: flutter pub get

    - name: 🛠️ 编译无签名 iOS App
      # 使用 --no-codesign 跳过苹果的证书校验
      run: flutter build ios --release --no-codesign

    - name: 🗜️ 组装成 IPA 文件
      # 手动把 Runner.app 打包成标准的 .ipa 格式
      run: |
        mkdir -p build/ios/iphoneos/Payload
        mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
        cd build/ios/iphoneos
        zip -qq -r fluxdo-compact-ui.ipa Payload
        
    - name: 📤 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: fluxdo-compact-ui-ipa
        path: build/ios/iphoneos/fluxdo-compact-ui.ipa
